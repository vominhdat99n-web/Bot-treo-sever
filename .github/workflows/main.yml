name: Minecraft Bot Treo 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Cập nhật lên v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Cập nhật lên v4
        with:
          node-version: 20 # Dùng Node 20 cho ổn định

      - name: Install dependencies
        run: |
          npm init -y
          npm install mineflayer

      - name: Start Minecraft Bot
        # QUAN TRỌNG: Kiểm tra tên file code của bạn là bot.js hay index.js
        # Nếu file là bot.js thì sửa dòng dưới thành: node bot.js
        run: node index.js 
        
