name: Minecraft Bot Treo 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Cứ mỗi 6 tiếng GitHub sẽ tự khởi động lại bot một lần để đảm bảo 24/7
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        # Cài đặt tất cả thư viện có trong package.json
        run: npm install

      - name: Start Minecraft Bot
        # Đảm bảo file bot của bạn tên là index.js, nếu tên khác thì sửa lại ở đây
        run: node index.js
        
