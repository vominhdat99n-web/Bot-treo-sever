name: Minecraft Bot New 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Tự reset mỗi 6 tiếng để giữ bot sống
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start Bot
        run: node index.js
        
